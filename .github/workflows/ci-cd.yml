name: CI/CD

on:
  push:
    branches: [main]

jobs:

  # 1. Run all tests + code quality
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npm run lint            # ESLint (cahier §4.2)
      - run: npm test                # Jest unit tests (cahier §5.1)
      - run: npm start &
      - run: npx wait-on http://localhost:8080
      - run: npm run cypress:run     # Cypress E2E tests (cahier §5.2)

  # 2. Build the Docker image
  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t fashionstore .

  # 3. Deploy to GitHub Pages
  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - uses: actions/deploy-pages@v4
